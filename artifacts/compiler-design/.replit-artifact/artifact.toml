kind = "web"
previewPath = "/"
title = "Compiler Design Mini Project"
version = "1.0.0"
id = "artifacts/compiler-design"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18393

[services.development]
run = "pnpm --filter @workspace/compiler-design run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/compiler-design", "run", "build" ]
publicDir = "artifacts/compiler-design/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18393"
BASE_PATH = "/"
